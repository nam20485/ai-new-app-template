name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment: # Issue 2: respond to inline PR code review comments
    types: [created]

permissions: read-all

concurrency: # Issue 5: prevent simultaneous runs on the same issue/PR
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  opencode:
    if: | # Issue 4: restrict to repo members to prevent abuse/prompt injection
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      ) && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 30 # Issue 6: cap runaway jobs
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1 # Issue 3: skip unnecessary full history
          persist-credentials: false # Issue 3: only opencode GitHub App should push

      - name: Run opencode
        uses: anomalyco/opencode/github@715b844c2a88810b6178d7a2467c7d36ea8fb764 # v1.2.17 (Issue 1: correct org + pinned SHA)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: github-copilot/claude-sonnet-4.5
