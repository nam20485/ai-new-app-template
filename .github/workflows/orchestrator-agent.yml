name: orchestrator-agent

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created, edited]
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited]
  workflow_run:
    types: [completed, requested]

jobs:
  opencode:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Load orchestrator prompt
        id: load-prompt
        shell: bash
        run: |
          {
            echo 'prompt<<EOF'
            cat .github/workflows/prompts/orchestrator-agent-prompt.md
            echo ""
            echo "--- GITHUB EVENT CONTEXT ---"
            echo "Event Name: ${{ github.event_name }}"
            echo "Action: ${{ github.event.action }}"
            echo "Actor: ${{ github.actor }}"
            echo "Repository: ${{ github.repository }}"
            echo "Ref: ${{ github.ref }}"
            echo "SHA: ${{ github.sha }}"
            echo ""
            echo "--- FULL EVENT DATA ---"
            echo "${{ toJson(github.event) }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run opencode
        uses: anomalyco/opencode/github@34ebe814ddd130a787455dda089facb23538ca20 #v1.1.65
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ORCHESTRATOR_AGENT_PROMPT: ${{ steps.load-prompt.outputs.prompt }}
        with:
          model: zai-coding-plan/glm-5
          agent: Orchestrator
          prompt: ${{ env.ORCHESTRATOR_AGENT_PROMPT }}